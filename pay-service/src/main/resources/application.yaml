server:
  port: 8086
spring:
  application:
    name: pay-service
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${imarket.db.host}:3306/imarket-pay?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${imarket.db.pw}
  rabbitmq:
    host: 127.0.0.1
    port: 5672 # 端口
    virtual-host: / # 虚拟主机
    username: imarket # 用户名
    password: 123321 # 密码
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.imarket: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
knife4j:
  enable: true
  openapi:
    title: 支付
    description: "iMarket商城接口文档"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.imarket.pay.controller